language: "ja-JP"
early_access: false

reviews:
  instructions: |
    コードレビュー時は以下の規約を必ず参照してください:
    - Assets/Docs/AGENTS.md
  profile: "chill"
  auto_review:
    enabled: true # 自動レビューを有効にする
    drafts: false # ドラフトPRをレビュー対象から除外
  path_filters:
    - "!dist/**" # ビルド成果物などをレビューから除外
    - "!node_modules/**"
  path_instructions:
    - path: "**/*.shader"
      instructions: "Unity HLSL/CG シェーダーファイルです。パフォーマンス、correctness、Unity のベストプラクティスに従ってレビューしてください。"
  tools:
    shellcheck:
      enabled: true # 特定のツールの有効・無効を切り替え