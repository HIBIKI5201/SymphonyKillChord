name: Notion Discord Bot

on:
  schedule:
    - cron: '0 22 * * *'  # JSTの7時（UTC 22時）
  workflow_dispatch:       # 手動実行も可能

jobs:
  run:
    runs-on: ubuntu-latest
    environment: 'Configure Sinfonia Operator'


    steps:
      - name: ソースを取得
        uses: actions/checkout@v4

      - name: .NETをセットアップ
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: ファイル構造をリストアップ
        run: ls -R

      - name: 依存関係の復元
        run: dotnet restore ./ProjectCS/SymphonyKillChordProjectCS/SymphonyKillChordProjectCS/SymphonyKillChordProjectCS.csproj

      - name: ビルド
        run: dotnet build ./ProjectCS/SymphonyKillChordProjectCS/SymphonyKillChordProjectCS/SymphonyKillChordProjectCS.csproj --configuration Release

      - name: 実行
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID: ${{ env.NOTION_DATABASE_ID }}
          NOTION_DATABASE_DATE_PROPERTY: ${{ env.NOTION_DATABASE_DATE_PROPERTY }}
        run: dotnet run --project ./ProjectCS/SymphonyKillChordProjectCS/SymphonyKillChordProjectCS/SymphonyKillChordProjectCS.csproj --configuration Release
